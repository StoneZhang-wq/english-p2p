<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>登录 — 英语口语练习</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="login">
    <div class="app-shell auth-page">
      <h1 class="page-title-simple">登录</h1>
      <p class="auth-error" id="authError" role="alert"></p>
      <form class="auth-form" id="loginForm" novalidate>
        <label for="email">邮箱</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="submit">登录</button>
      </form>
      <p class="auth-footer">没有账号？<a href="register.html">注册</a> · <a href="index.html">返回首页</a></p>
    </div>
    <script>
      (function () {
        var errEl = document.getElementById("authError");
        document.getElementById("loginForm").addEventListener("submit", function (e) {
          e.preventDefault();
          errEl.textContent = "";
          var email = document.getElementById("email").value.trim();
          var password = document.getElementById("password").value;
          fetch("/api/auth/login", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, j: j };
              });
            })
            .then(function (x) {
              if (x.j.code === 0) {
                var next = new URLSearchParams(window.location.search).get("next");
                if (next && !/^[a-z][a-z0-9+.-]*:/i.test(next) && !next.startsWith("//")) {
                  window.location.href = next;
                } else {
                  window.location.href = "index.html";
                }
                return;
              }
              errEl.textContent = x.j.message || "登录失败";
            })
            .catch(function () {
              errEl.textContent = "网络错误，请重试";
            });
        });
      })();
    </script>
  </body>
</html>
